{% extends 'portfolio/base.html' %}
{% block title %}Confirm Delete — DevFolio{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
  <div class="card" style="max-width:440px;width:100%;text-align:center">
    <div class="card-b" style="padding:48px 32px">
      <div style="font-size:44px;margin-bottom:16px">⚠️</div>
      <h2 style="font-weight:800;font-size:20px;margin-bottom:8px">Delete {{ object_type }}?</h2>
      <p style="color:var(--t2);font-size:14px;margin-bottom:24px;line-height:1.6">
        You are about to permanently delete <strong style="color:var(--t1)">{{ object }}</strong>.<br>
        <span style="font-family:var(--mono);font-size:11px;color:var(--orange)">// this action cannot be undone</span>
      </p>
      <form method="post" style="display:flex;gap:10px;justify-content:center">
        {% csrf_token %}
        <button type="submit" class="btn btn-d">confirm_delete()</button>
        <a href="{% url cancel_url %}" class="btn btn-g">cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
